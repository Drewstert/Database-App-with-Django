<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mythical Mane Tables</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
        <section class="rounded-3xl border border-white/10 bg-white/5 p-6 shadow-2xl shadow-black/30 backdrop-blur">
            <header class="mb-6">
                <p class="text-xs font-semibold uppercase tracking-[0.22em] text-cyan-300">Mythical Mane</p>
                <h1 class="mt-2 text-3xl font-bold tracking-tight">All Tables</h1>
                <p class="mt-2 text-sm text-slate-300">Select a table to view its records.</p>
            </header>

            <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
                {% for table in tables %}
                    <a
                        href="/tables/{{ table.slug }}/"
                        class="group rounded-2xl border border-white/10 bg-slate-900/70 p-4 transition hover:border-cyan-300/60 hover:bg-slate-900"
                    >
                        <p class="text-sm font-semibold text-white group-hover:text-cyan-200">{{ table.title }}</p>
                        <p class="mt-1 text-xs text-slate-400">/tables/{{ table.slug }}/</p>
                    </a>
                {% empty %}
                    <p class="text-sm text-slate-300">No tables found.</p>
                {% endfor %}
            </div>
        </section>
    </main>
</body>
</html>
